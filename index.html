<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bohemian Life</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Bohemian Life</h1>
      <p class="tagline">Handcrafted bohemian-inspired goods made to bring warmth and personality into everyday spaces.</p>
    </header>

    <main>
      <section class="featured-product" aria-labelledby="featured-title">
        <h2 id="featured-title">Featured Product</h2>
        <article class="product-card">
          <div class="product-image" role="img" aria-label="Woven macramé wall hanging"></div>
          <div class="product-content">
            <h3>Sunrise Macramé Wall Hanging</h3>
            <p>
              Add texture and a natural, calming touch to your home with this hand-knotted macramé wall hanging crafted from soft cotton cord.
            </p>
          </div>
        </article>
      </section>

      <section class="cta-section">
        <button type="button" class="coming-soon-btn">Shop Coming Soon</button>
      </section>
    </main>
  </body>
</html>
